    <title>Netflix - Browse</title>

<body>
    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <img src="images/logo.svg" alt="Netflix Logo" class="logo" onclick="window.location.href='index.html'" style="cursor: pointer;">
        <div class="nav-right">
            <span style="margin-right: 20px; font-size: 14px; color: #b3b3b3;" id="user-email"></span>
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" alt="User Avatar" class="avatar" id="user-avatar" title="Click to logout">
        </div>
    </nav>

    <!-- Hero Billboard Section -->

        <div class="hero-content">
            <h1 class="hero-title">Trending Hits</h1>
            <p class="hero-description">Watch the most trending movies and TV shows, exclusively on Netflix. Enjoy your premium membership with unlimited access to top-rated content.</p>
            <div class="hero-buttons">
                <button class="btn-play" id="play-btn">▶ Play</button>
                <button class="btn-more-info">ℹ More Info</button>
            </div>
        </div>
        <div class="hero-overlay"></div>
    </div>
